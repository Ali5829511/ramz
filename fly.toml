# Fly.io configuration for ramz-abda-platform
app = "ramz-abda"
primary_region = "ams"

[build]
  builder = "heroku"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  TRUST_PROXY = "true"
  FORCE_HTTPS = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[checks]
  [checks.alive]
    type = "http"
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"
